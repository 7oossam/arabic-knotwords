<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مُقيّم الألغاز | Puzzle Judge</title>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f3ea; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #2c3e50; }
        .container { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { margin-top: 0; }
        .puzzle-grid { display: grid; gap: 0; margin: 20px auto; justify-content: center; position: relative; }
        .cell { background-color: #fff; border: 1px solid #ddd; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: bold; position: relative; width: 50px; height: 50px; color: #2c3e50; }
        .cell.empty { background-color: transparent; border: none; }
        .border-top-thick { border-top: 4px solid #111; }
        .border-bottom-thick { border-bottom: 4px solid #111; }
        .border-right-thick { border-right: 4px solid #111; }
        .border-left-thick { border-left: 4px solid #111; }
        .region-hint { position: absolute; top: 2px; right: 4px; font-size: 0.7rem; color: #34495e; font-weight: bold; white-space: pre-wrap; text-align: right; pointer-events: none; }

        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit; font-size: 1rem; resize: none; box-sizing: border-box; }

        .buttons { display: flex; gap: 15px; justify-content: center; }
        button { padding: 12px 25px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: opacity 0.2s; color: white; flex: 1; }
        button:hover { opacity: 0.9; }
        .btn-approve { background-color: #27ae60; }
        .btn-reject { background-color: #e74c3c; }
        .btn-skip { background-color: #95a5a6; }

        #stats { margin-bottom: 15px; font-size: 1.1rem; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>مُقيّم الألغاز | Puzzle Judge</h1>
    <div id="stats">جاري التحميل...</div>

    <div id="puzzle-display"></div>

    <div class="controls" id="controls" style="display: none;">
        <textarea id="notes" placeholder="اكتب ملاحظاتك عن هذا اللغز هنا (اختياري)..."></textarea>
        <div class="buttons">
            <button class="btn-approve" onclick="submitJudgment(true)">قبول اللغز (Approve)</button>
            <button class="btn-reject" onclick="submitJudgment(false)">رفض اللغز (Reject)</button>
            <button class="btn-skip" onclick="skipPuzzle()">تخطي (Skip)</button>
        </div>
    </div>
</div>

<script>
    let currentHash = null;
    let currentPuzzle = null;

    async function loadNextPuzzle() {
        document.getElementById('puzzle-display').innerHTML = '<p>جاري البحث عن اللغز التالي...</p>';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('notes').value = '';

        try {
            const res = await fetch('/next-puzzle');
            const data = await res.json();

            if (data.done) {
                document.getElementById('puzzle-display').innerHTML = `<h2>🎉 ${data.message}</h2><p>تم تقييم جميع الألغاز الحالية.</p>`;
                return;
            }

            currentHash = data.hash;
            currentPuzzle = data.puzzle;
            renderPuzzle(currentPuzzle);
            document.getElementById('controls').style.display = 'flex';

            document.getElementById('stats').innerText = `عدد الكلمات: ${currentPuzzle.words.length} | عدد المناطق: ${currentPuzzle.regions.length}`;

        } catch (e) {
            document.getElementById('puzzle-display').innerHTML = `<p style="color:red;">خطأ: ${e.message}</p>`;
        }
    }

    function renderPuzzle(puzzle) {
        const container = document.getElementById('puzzle-display');
        container.innerHTML = '';

        const gridContainer = document.createElement('div');
        gridContainer.className = 'puzzle-grid';
        gridContainer.style.gridTemplateColumns = `repeat(${puzzle.cols}, 50px)`;
        gridContainer.style.gridTemplateRows = `repeat(${puzzle.rows}, 50px)`;

        const cellToRegion = {};
        const regionFirstCell = {};

        puzzle.regions.forEach(region => {
            region.cells.forEach(([r, c]) => {
                cellToRegion[`${r},${c}`] = region;
            });
            const sortedCells = [...region.cells].sort((a, b) => {
                if (a[0] !== b[0]) return a[0] - b[0];
                return a[1] - b[1];
            });
            regionFirstCell[region.id] = `${sortedCells[0][0]},${sortedCells[0][1]}`;
        });

        for (let r = 0; r < puzzle.rows; r++) {
            for (let c = 0; c < puzzle.cols; c++) {
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell';

                const char = puzzle.solution[r][c];
                if (char === ' ') {
                    cellDiv.classList.add('empty');
                } else {
                    const region = cellToRegion[`${r},${c}`];
                    if (region) {
                        cellDiv.innerText = char;

                        if (regionFirstCell[region.id] === `${r},${c}`) {
                            const hintSpan = document.createElement('span');
                            hintSpan.className = 'region-hint';
                            hintSpan.innerText = region.letters.join('');
                            cellDiv.appendChild(hintSpan);
                        }

                        if (r === 0 || cellToRegion[`${r-1},${c}`] !== region) cellDiv.classList.add('border-top-thick');
                        if (r === puzzle.rows - 1 || cellToRegion[`${r+1},${c}`] !== region) cellDiv.classList.add('border-bottom-thick');
                        if (c === 0 || cellToRegion[`${r},${c-1}`] !== region) cellDiv.classList.add('border-right-thick');
                        if (c === puzzle.cols - 1 || cellToRegion[`${r},${c+1}`] !== region) cellDiv.classList.add('border-left-thick');
                    }
                }

                gridContainer.appendChild(cellDiv);
            }
        }
        container.appendChild(gridContainer);
    }

    async function submitJudgment(approved) {
        if (!currentPuzzle) return;

        const notes = document.getElementById('notes').value;

        try {
            await fetch('/judge', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    hash: currentHash,
                    puzzle: currentPuzzle,
                    approved,
                    notes
                })
            });

            // Load next immediately
            loadNextPuzzle();

        } catch (e) {
            alert("فشل حفظ التقييم: " + e.message);
        }
    }

    function skipPuzzle() {
        // Just reload the page or fetch next if we implemented a skip API.
        // For now, reload bypasses because the API selects the *first* unjudged puzzle.
        // We'd need to modify the server to support explicit skipping.
        // We'll just alert for now.
        alert("وظيفة التخطي تتطلب تعديل الخادم. استخدم قبول أو رفض.");
    }

    // Initialize
    window.onload = loadNextPuzzle;

</script>
</body>
</html>
