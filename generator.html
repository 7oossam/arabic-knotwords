<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد الألغاز - لعبة الكلمات العربية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #3498db;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.98);
        }

        #btn-copy {
            background-color: #27ae60;
        }

        #btn-copy:hover {
            background-color: #2ecc71;
        }

        .output-container {
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
            margin-top: 20px;
        }

        .visual-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }

        .puzzle-card {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .puzzle-card h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        .puzzle-grid {
            display: grid;
            gap: 0; /* Flush cells for Knotwords aesthetic */
            background-color: transparent; /* No background, borders will define it */
            margin-bottom: 20px;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.2); /* Heavy drop shadow */
            border-radius: 4px;
        }

        .cell {
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            width: 50px;
            height: 50px;
            position: relative;
            box-sizing: border-box;
            border: 1px solid #ddd; /* Thin internal borders */
        }

        .cell.empty {
            background-color: transparent;
            border: none;
        }

        /* Thicker borders for regions */
        .border-top-thick { border-top: 3px solid #333 !important; }
        .border-bottom-thick { border-bottom: 3px solid #333 !important; }
        .border-left-thick { border-left: 3px solid #333 !important; }
        .border-right-thick { border-right: 3px solid #333 !important; }

        .region-hint {
            position: absolute;
            top: 2px;
            right: 4px; /* RTL, visual top-right is logical top-left */
            font-size: 10px;
            color: #7f8c8d;
            font-weight: normal;
            white-space: pre-wrap;
            line-height: 1;
            text-align: right;
            max-width: 44px; /* allow wrapping if it's a long list */
            letter-spacing: 1px;
        }

        pre {
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
            color: #2c3e50;
            direction: ltr; /* JSON is LTR */
            text-align: left;
            white-space: pre-wrap; /* allow wrapping on mobile */
        }

        .toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 10px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
        }

        .toast.show {
            visibility: visible;
            -webkit-animation: fadein 0.5s, fadeout 0.5s 2.5s;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @-webkit-keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @-webkit-keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>

                        hasAnchor = true;
                    } else {
                        targetSize = Math.floor(Math.random() * (maxSize - minSize + 1)) + minSize;
                    }

                    let helpfulCount = helpfulLetters.has(this.grid[sr][sc]) ? 1 : 0;

                    // Grow region
                    while (currentRegionCells.length < targetSize) {
                        const neighbors = [];
                        currentRegionCells.forEach(([cr, cc]) => {
                            neighbors.push(...getAdjacent(cr, cc));
                        });

                        if (neighbors.length === 0) break;

                        // Prioritize neighbors that change direction (cornering) to avoid straight lines
                        // and neighbors that add helpful letters if we don't have enough
                        let bestNeighbor = null;
                        let bestScore = -Infinity;

                        for (let [nr, nc] of neighbors) {
                            let score = Math.random(); // Base randomness

                            // Check straight lines
                            let isStraightLine = false;
                            if (currentRegionCells.length >= 2) {
                                const allSameRow = currentRegionCells.every(cell => cell[0] === nr) || currentRegionCells.every(cell => cell[0] === currentRegionCells[0][0]) && currentRegionCells[0][0] === nr;
                                const allSameCol = currentRegionCells.every(cell => cell[1] === nc) || currentRegionCells.every(cell => cell[1] === currentRegionCells[0][1]) && currentRegionCells[0][1] === nc;
                                if (allSameRow || allSameCol) {
                                    isStraightLine = true;
                                    score -= 2; // Penalize straight lines
                                } else {
                                    score += 2; // Reward corners/L-shapes
                                }
                            }

                            // Check full word rule: roughly, if a region is becoming a long straight line, it might contain a full word.
                            // The straight line penalty helps prevent this organically.

                            // Check letter balance
                            let isHelpful = helpfulLetters.has(this.grid[nr][nc]);
                            if (helpfulCount === 0 && isHelpful) {
                                score += 3; // Strongly prefer helpful letters if we have none
                            } else if (helpfulCount > 1 && isHelpful) {
                                score -= 1; // Don't hoard helpful letters
                            }

                            if (score > bestScore) {
                                bestScore = score;
                                bestNeighbor = [nr, nc];
                            }
                        }

                        if (!bestNeighbor) bestNeighbor = neighbors[0]; // fallback

                        currentRegionCells.push(bestNeighbor);
                        unassigned.delete(`${bestNeighbor[0]},${bestNeighbor[1]}`);
                        if (helpfulLetters.has(this.grid[bestNeighbor[0]][bestNeighbor[1]])) helpfulCount++;
                    }

                    regions.push({
                        id: `r${regionIdCounter++}`,
                        cells: currentRegionCells,
                        letters: currentRegionCells.map(([r, c]) => this.grid[r][c]).sort()
                    });
                }

                // Consolidation: Merge tiny regions (if any got stranded)
                let consolidated = true;
                while (consolidated) {
                    consolidated = false;
                    for (let i = 0; i < regions.length; i++) {
                        // If it's the only anchor region, maybe let it stay small, but if there are multiple or it's size 1
                        if (regions[i].cells.length < 2 || (regions[i].cells.length < 4 && regions.length > 5 && Math.random() > 0.5)) {
                            const smallRegion = regions[i];
                            let merged = false;
                            for (const [r, c] of smallRegion.cells) {
                                const adj = [[r-1, c], [r+1, c], [r, c-1], [r, c+1]];
                                for (const [nr, nc] of adj) {
                                    const adjRegion = regions.find(reg => reg.id !== smallRegion.id && reg.cells.some(([rr, cc]) => rr === nr && cc === nc));
                                    if (adjRegion && adjRegion.cells.length + smallRegion.cells.length <= maxSize + 1) {
                                        adjRegion.cells.push(...smallRegion.cells);
                                        adjRegion.letters.push(...smallRegion.letters);
                                        adjRegion.letters.sort();
                                        regions.splice(i, 1);
                                        merged = true;
                                        consolidated = true;
                                        break;
                                    }
                                }
                                if (merged) break;
                            }
                        }
                    }
                }

                return regions;
            }
        }

        // --- 3. Wrapper ---
        function generateGamePuzzle(subject, difficulty) {
            const templates = puzzleTemplates[difficulty];
            // Try different templates until one succeeds
            for (let i = 0; i < 50; i++) {
                const template = shuffle(templates)[0];
                const gen = new DenseCrosswordGenerator(template, subject);
                const success = gen.generate();

                if (success) {
                    const solutionData = gen.getSolution();
                    const regions = gen.generateRegions(4, 6); // We will update this heuristic later

                    // Generate hints for the exact words used in this puzzle
                    const generatedHints = {};
                    solutionData.words.forEach(word => {
                        if (genericClues[word]) {
                            generatedHints[word] = genericClues[word];
                        } else if (wordBank[subject] && wordBank[subject].includes(word)) {
                            generatedHints[word] = `كلمة متعلقة بموضوع (${subject})`;
                        } else {
                            generatedHints[word] = `تلميح للكلمة: ${word}`;
                        }
                    });

                    return {
                        theme: subject,
                        rows: gen.rows,
                        cols: gen.cols,
                        solution: solutionData.grid,
                        regions: regions,
                        clues: generatedHints
                    };
                }
            }
            return null;
        }

        function getValidPuzzle(subject, difficulty) {
            let puzzle = null;
            let attempts = 0;
            while (!puzzle && attempts < 20) {
                puzzle = generateGamePuzzle(subject, difficulty);
                attempts++;
            }
            return puzzle || { error: "Failed to generate puzzle" };
        }

        // --- 4. UI Events ---
        document.getElementById('btn-generate').addEventListener('click', () => {
            const subjects = Object.keys(wordBank);
            // Randomly pick subjects for variety
            const randomSubject = () => subjects[Math.floor(Math.random() * subjects.length)];

            const newPuzzles = {
                easy: getValidPuzzle(randomSubject(), "easy"),
                medium: getValidPuzzle(randomSubject(), "medium"),
                large: getValidPuzzle(randomSubject(), "large")
            };

            const jsonStr = JSON.stringify(newPuzzles, null, 2);
            document.getElementById('output-json').innerText = jsonStr;

            // Render it visually
            renderVisualPuzzles(newPuzzles);
        });

        document.getElementById('btn-copy').addEventListener('click', () => {
            const outputText = document.getElementById('output-json').innerText;
            if (outputText === "اضغط على زر التوليد لإنشاء الألغاز...") return;

            navigator.clipboard.writeText(outputText).then(() => {
                const toast = document.getElementById('toast');
                toast.className = "toast show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
            }).catch(err => {
                console.error('Could not copy text: ', err);
                alert("حدث خطأ أثناء النسخ");
            });
        });

        // --- 5. Visual Rendering ---
        function renderVisualPuzzles(puzzlesObj) {
            const container = document.getElementById('visual-puzzles');
            container.innerHTML = ''; // clear

            const levels = [
                { key: 'easy', title: 'سهل (Easy)' },
                { key: 'medium', title: 'متوسط (Medium)' },
                { key: 'large', title: 'صعب (Large)' }
            ];

            levels.forEach(level => {
                const puzzle = puzzlesObj[level.key];
                if (!puzzle) return;

                const card = document.createElement('div');
                card.className = 'puzzle-card';

                if (puzzle.error) {
                    const title = document.createElement('h2');
                    title.innerText = `${level.title} - ${puzzle.error}`;
                    card.appendChild(title);
                    container.appendChild(card);
                    return;
                }

                const title = document.createElement('h2');
                title.innerText = `${level.title} - الموضوع: ${puzzle.theme}`;
                card.appendChild(title);

                const gridContainer = document.createElement('div');
                gridContainer.className = 'puzzle-grid';

                // Adjust for dynamic bounding box sizing
                const cellPx = 50;
                gridContainer.style.gridTemplateColumns = `repeat(${puzzle.cols}, ${cellPx}px)`;
                gridContainer.style.gridTemplateRows = `repeat(${puzzle.rows}, ${cellPx}px)`;
                gridContainer.style.width = `${puzzle.cols * cellPx}px`;
                gridContainer.style.height = `${puzzle.rows * cellPx}px`;

                // Map cells to regions for borders and identify the top-rightmost cell for hints
                const cellToRegion = {};
                const regionFirstCell = {};

                puzzle.regions.forEach(region => {
                    region.cells.forEach(([r, c]) => {
                        cellToRegion[`${r},${c}`] = region;
                    });

                    // Find the top-rightmost cell for this region (in RTL, lowest column index is right)
                    const sortedCells = [...region.cells].sort((a, b) => {
                        if (a[0] !== b[0]) return a[0] - b[0]; // Top-most first
                        return a[1] - b[1]; // Right-most first
                    });
                    regionFirstCell[region.id] = `${sortedCells[0][0]},${sortedCells[0][1]}`;
                });

                for (let r = 0; r < puzzle.rows; r++) {
                    for (let c = 0; c < puzzle.cols; c++) {
                        const cellDiv = document.createElement('div');
                        cellDiv.className = 'cell';

                        const char = puzzle.solution[r][c];
                        if (char === ' ') {
                            cellDiv.classList.add('empty');
                            cellDiv.style.border = 'none'; // hide borders for empty
                        } else {
                            const region = cellToRegion[`${r},${c}`];

                            if (region) {
                                const isFirstCell = regionFirstCell[region.id] === `${r},${c}`;

                                if (isFirstCell) {
                                    const hintSpan = document.createElement('span');
                                    hintSpan.className = 'region-hint';
                                    hintSpan.innerText = region.letters.join(' ');
                                    cellDiv.appendChild(hintSpan);
                                }

                                const charSpan = document.createElement('span');
                                charSpan.innerText = char;
                                cellDiv.appendChild(charSpan);

                                // Add borders to define regions visually
                                // Note: Since the CSS gap is 0, we must ensure empty cells adjacent to filled cells don't hide the border.
                                if (r === 0 || cellToRegion[`${r-1},${c}`] !== region) cellDiv.classList.add('border-top-thick');
                                if (r === puzzle.rows - 1 || cellToRegion[`${r+1},${c}`] !== region) cellDiv.classList.add('border-bottom-thick');
                                // Note: RTL means Left is Right visually, but we apply border based on index
                                if (c === 0 || cellToRegion[`${r},${c-1}`] !== region) cellDiv.classList.add('border-right-thick'); // Because dir=rtl, index 0 is on the right visually
                                if (c === puzzle.cols - 1 || cellToRegion[`${r},${c+1}`] !== region) cellDiv.classList.add('border-left-thick');
                            }
                        }

                        gridContainer.appendChild(cellDiv);
                    }
                }
                card.appendChild(gridContainer);

                container.appendChild(card);
            });
        }

        // Generate first puzzle on load automatically
        document.getElementById('btn-generate').click();
    </script>
</body>
