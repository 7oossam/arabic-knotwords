<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كلمات متشابكة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>كلمات متشابكة</h1>
        <div class="stats-container">
            <div id="floor-display">الطابق: <span id="floor-level">1</span></div>
            <div id="hints-display">
                <button id="btn-hint" class="hint-btn" title="استخدم تلميح">
                    💡 <span id="hints-left">3</span>
                </button>
            </div>
            <div id="hearts-display">القلوب: <span id="hearts-text">❤️❤️❤️❤️❤️</span></div>
        </div>
    </header>

    <div id="theme-display" class="theme-container">
        الموضوع: <span id="theme-text">...</span>
    </div>

    <div id="clue-display" class="clue-container" style="display: none;">
        <span id="clue-text"></span>
    </div>

    <main>
        <div id="game-board" class="board"></div>
    </main>

    <footer>
        <div id="active-relics-container" class="relics-container" style="display: none;">
            <!-- Active relics will be appended here -->
        </div>
        <div class="keyboard-header">
            <span id="region-letters">الرجاء اختيار منطقة</span>
        </div>
        <div id="keyboard" class="keyboard"></div>
        <button id="btn-submit" class="submit-btn" disabled>تحقق من الإجابة</button>
    </footer>

    <div id="draft-overlay" class="overlay">
        <div class="overlay-content draft-content">
            <h2 style="color: #8e44ad;">مكافأة الطابق! 🎁</h2>
            <p>اختر أداة لتساعدك في رحلتك:</p>
            <div id="draft-choices" class="draft-choices">
                <!-- Draft buttons injected here -->
            </div>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <div class="overlay-content">
            <h2>عمل رائع! 🎉</h2>
            <p>لقد أكملت الطابق بنجاح.</p>
            <button id="btn-next" style="margin-top: 20px;">انتقل للطابق التالي</button>
        </div>
    </div>

    <div id="game-over-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="color: #e74c3c;">انتهت اللعبة! 💀</h2>
            <p>لقد نفذت أخطاؤك المسموحة.</p>
            <p id="final-floor-text">وصلت إلى الطابق: 1</p>
            <button id="btn-restart" style="margin-top: 20px; background-color: #e74c3c;">حاول مرة أخرى</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
