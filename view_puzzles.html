<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معاينة الألغاز (30 لغز)</title>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f3ea; display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; }
        .puzzle-grid { display: grid; gap: 0; margin-bottom: 10px; }
        .cell { background-color: #fff; border: 1px solid #ddd; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; position: relative; width: 35px; height: 35px; color: #2c3e50; }
        .cell.empty { background-color: transparent; border: none; }
        .border-top-thick { border-top: 3px solid #34495e; }
        .border-bottom-thick { border-bottom: 3px solid #34495e; }
        .border-right-thick { border-right: 3px solid #34495e; }
        .border-left-thick { border-left: 3px solid #34495e; }
        .region-hint { position: absolute; top: 1px; right: 1px; font-size: 0.5rem; color: #7f8c8d; font-weight: normal; }
        .info { font-size: 0.9rem; text-align: center; color: #555; }
    </style>
</head>
<body>
    <script src="script.js"></script>
    <script>
        // Use the globally exposed puzzles array
        puzzles.forEach((puzzle, index) => {
            const card = document.createElement('div');
            card.className = 'card';

            const title = document.createElement('h3');
            title.innerText = `لغز رقم ${index + 1}`;
            title.style.margin = "0 0 10px 0";
            card.appendChild(title);

            const gridContainer = document.createElement('div');
            gridContainer.className = 'puzzle-grid';
            gridContainer.style.gridTemplateColumns = `repeat(${puzzle.cols}, 35px)`;
            gridContainer.style.gridTemplateRows = `repeat(${puzzle.rows}, 35px)`;

            const cellToRegion = {};
            const regionFirstCell = {};

            puzzle.regions.forEach(region => {
                region.cells.forEach(([r, c]) => {
                    cellToRegion[`${r},${c}`] = region;
                });
                const sortedCells = [...region.cells].sort((a, b) => {
                    if (a[0] !== b[0]) return a[0] - b[0];
                    return a[1] - b[1];
                });
                regionFirstCell[region.id] = `${sortedCells[0][0]},${sortedCells[0][1]}`;
            });

            for (let r = 0; r < puzzle.rows; r++) {
                for (let c = 0; c < puzzle.cols; c++) {
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';

                    const char = puzzle.solution[r][c];
                    if (char === ' ') {
                        cellDiv.classList.add('empty');
                    } else {
                        const region = cellToRegion[`${r},${c}`];
                        if (region) {
                            if (regionFirstCell[region.id] === `${r},${c}`) {
                                const hintSpan = document.createElement('span');
                                hintSpan.className = 'region-hint';
                                hintSpan.innerText = region.letters.join('');
                                cellDiv.appendChild(hintSpan);
                            }

                            cellDiv.innerText = char;

                            if (r === 0 || cellToRegion[`${r-1},${c}`] !== region) cellDiv.classList.add('border-top-thick');
                            if (r === puzzle.rows - 1 || cellToRegion[`${r+1},${c}`] !== region) cellDiv.classList.add('border-bottom-thick');
                            if (c === 0 || cellToRegion[`${r},${c-1}`] !== region) cellDiv.classList.add('border-right-thick');
                            if (c === puzzle.cols - 1 || cellToRegion[`${r},${c+1}`] !== region) cellDiv.classList.add('border-left-thick');
                        }
                    }

                    gridContainer.appendChild(cellDiv);
                }
            }
            card.appendChild(gridContainer);

            const info = document.createElement('div');
            info.className = 'info';
            info.innerText = `الكلمات: ${puzzle.words.length} | المناطق: ${puzzle.regions.length}`;
            card.appendChild(info);

            document.body.appendChild(card);
        });
    </script>
</body>
</html>
